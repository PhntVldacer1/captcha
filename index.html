
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  #app {
    min-height: 520px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    font-family: Roboto, Arial, sans-serif;
  }
  .rc-anchor {
    background: #f9f9f9;
    border: 1px solid #d3d3d3;
    border-radius: 3px;
    box-shadow: 0 0 4px 1px rgba(0,0,0,0.08);
    width: 300px;
    overflow: hidden;
  }
  .rc-anchor-normal {
    display: flex;
    align-items: center;
    height: 74px;
  }
  .rc-anchor-checkbox-holder {
    width: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    cursor: pointer;
  }
  .rc-checkbox {
    width: 24px; height: 24px;
    border: 2px solid #c1c1c1;
    border-radius: 2px;
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.15s;
    cursor: pointer;
    position: relative;
  }
  .rc-checkbox:hover { border-color: #4a90d9; }
  .spinner-wrap { display: none; width: 24px; height: 24px; align-items: center; justify-content: center; }
  .spinner-wrap.spinning { display: flex; }
  .spinner { width: 22px; height: 22px; border: 2px solid #e0e0e0; border-top-color: #4285f4; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .checkmark-svg { display: none; }
  .checkmark-svg.visible { display: block; }
  .rc-anchor-content { flex: 1; display: flex; align-items: center; }
  .rc-anchor-label { font-size: 14px; color: #000; user-select: none; cursor: pointer; }
  .rc-anchor-logo-holder {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    width: 66px; flex-shrink: 0; padding: 6px 4px;
    border-left: 1px solid #d3d3d3; height: 74px;
  }
  .rc-logo { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .rc-logo-text { font-size: 8px; color: #999; text-align: center; line-height: 1.3; }
  .rc-logo-text span { display: block; font-size: 9px; font-weight: 700; color: #666; }
  .rc-footer { background: #f9f9f9; border-top: 1px solid #e0e0e0; display: flex; align-items: center; justify-content: space-between; padding: 4px 10px; font-size: 9px; color: #999; }
  .rc-footer a { color: #999; text-decoration: none; }

  .challenge-box {
    display: none;
    background: white;
    border: 1px solid #d3d3d3;
    border-radius: 3px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    width: 300px;
    margin-top: 8px;
    overflow: hidden;
  }
  .challenge-box.visible { display: block; }
  .challenge-header { background: #4285f4; padding: 10px 14px; }
  .challenge-header-text { font-size: 13px; color: white; font-weight: 500; }
  .challenge-header-sub { font-size: 11px; color: rgba(255,255,255,0.8); margin-top: 2px; }
  .challenge-body { padding: 14px; background: white; }
  .captcha-img-wrap {
    background: #ede8d8;
    border: 1px solid #c8c0a8;
    border-radius: 2px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 10px; overflow: hidden; height: 86px;
  }
  canvas#captchaCanvas { display: block; width: 100%; height: 86px; }
  .challenge-input {
    width: 100%;
    padding: 8px 10px;
    font-size: 14px;
    border: 1px solid #ccc;
    border-radius: 2px;
    outline: none;
    font-family: Roboto, Arial, sans-serif;
    color: #333;
    background: #ffffff;
    transition: border-color 0.15s;
    margin-bottom: 10px;
  }
  .challenge-input:focus { border-color: #4285f4; box-shadow: 0 0 0 1px #4285f4; }
  .challenge-actions { display: flex; justify-content: flex-end; }
  .btn-verify {
    background: #4285f4;
    color: white;
    border: none;
    border-radius: 2px;
    padding: 7px 18px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    font-family: Roboto, Arial, sans-serif;
    transition: background 0.15s;
  }
  .btn-verify:hover { background: #3367d6; }
  .btn-verify:active { background: #2a56c6; }
  .feedback-msg {
    font-size: 12px; padding: 6px 10px; border-radius: 2px;
    display: none; margin-bottom: 8px;
  }
  .feedback-msg.success { display: block; background: #e6f4ea; color: #137333; border: 1px solid #ceead6; }
  .feedback-msg.error { display: block; background: #fce8e6; color: #c5221f; border: 1px solid #f5c6c3; }
  .challenge-footer { background: #f9f9f9; border-top: 1px solid #e0e0e0; padding: 5px 14px; font-size: 9px; color: #999; display: flex; align-items: center; gap: 4px; }
</style>

<div id="app">
  <div style="display:flex;flex-direction:column;align-items:flex-start;">
    <div class="rc-anchor">
      <div class="rc-anchor-normal">
        <div class="rc-anchor-checkbox-holder" id="checkboxHolder" onclick="handleCheck()">
          <div class="rc-checkbox" id="rcCheckbox">
            <div class="spinner-wrap" id="spinnerWrap"><div class="spinner"></div></div>
            <svg class="checkmark-svg" id="checkmarkSvg" width="38" height="38" viewBox="0 0 38 38">
              <path d="M 12.5 19.5 L 17 24 L 26 14" fill="none" stroke="#4285f4" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>
        <div class="rc-anchor-content">
          <div class="rc-anchor-label" onclick="handleCheck()">I'm not a robot</div>
        </div>
        <div class="rc-anchor-logo-holder">
          <div class="rc-logo">
            <svg width="32" height="32" viewBox="0 0 64 64">
              <circle cx="32" cy="32" r="30" fill="none" stroke="#4285f4" stroke-width="3"/>
              <circle cx="32" cy="32" r="30" fill="none" stroke="#ea4335" stroke-width="3" stroke-dasharray="47 142"/>
              <circle cx="32" cy="32" r="30" fill="none" stroke="#fbbc04" stroke-width="3" stroke-dasharray="47 142" stroke-dashoffset="-47"/>
              <circle cx="32" cy="32" r="30" fill="none" stroke="#34a853" stroke-width="3" stroke-dasharray="47 142" stroke-dashoffset="-95"/>
              <circle cx="32" cy="20" r="6" fill="#4285f4"/>
              <rect x="26" y="27" width="12" height="14" rx="2" fill="#4285f4"/>
            </svg>
            <div class="rc-logo-text"><span>reCAPTCHA</span>Privacy - Terms</div>
          </div>
        </div>
      </div>
      <div class="rc-footer">
        <span>Protected by reCAPTCHA</span>
        <span><a href="#">Privacy</a> - <a href="#">Terms</a></span>
      </div>
    </div>

    <div class="challenge-box" id="challengeBox">
      <div class="challenge-header">
        <div class="challenge-header-text">Type the text you see</div>
        <div class="challenge-header-sub">Case insensitive</div>
      </div>
      <div class="challenge-body">
        <div class="captcha-img-wrap">
          <canvas id="captchaCanvas" width="272" height="86"></canvas>
        </div>
        <div class="feedback-msg" id="feedbackMsg"></div>
        <input class="challenge-input" id="captchaInput" type="text" placeholder="Enter the text above" autocomplete="off"/>
        <div class="challenge-actions">
          <button class="btn-verify" onclick="verifyCaptcha()">Verify</button>
        </div>
      </div>
      <div class="challenge-footer">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="#4285f4"><circle cx="12" cy="12" r="10"/></svg>
        reCAPTCHA · Privacy · Terms
      </div>
    </div>
  </div>
</div>

<script>
const phrases = [
  "Babft is cool",
  "Build anything",
  "Chillz Studios",
  "Phnt Club"
];

const fonts = [
  "Georgia,serif","Impact,fantasy","'Courier New',monospace",
  "Arial Black,sans-serif","Palatino,serif","'Times New Roman',serif",
  "Trebuchet MS,sans-serif","Comic Sans MS,cursive","Garamond,serif","Verdana,sans-serif"
];

let currentPhrase = "";
let checked = false;

function rnd(min, max) { return Math.random() * (max - min) + min; }
function rndInt(min, max) { return Math.floor(rnd(min, max)); }

function drawCaptcha(text) {
  const canvas = document.getElementById("captchaCanvas");
  const ctx = canvas.getContext("2d");
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  ctx.fillStyle = "#ede8d8";
  ctx.fillRect(0, 0, W, H);

  for (let i = 0; i < 6; i++) {
    ctx.beginPath();
    ctx.arc(rnd(0,W), rnd(0,H), rnd(20,60), 0, Math.PI*2);
    ctx.fillStyle = `rgba(${rndInt(160,210)},${rndInt(150,200)},${rndInt(100,160)},0.18)`;
    ctx.fill();
  }

  for (let i = 0; i < 10; i++) {
    ctx.beginPath();
    ctx.moveTo(rnd(0,W), rnd(0,H));
    ctx.bezierCurveTo(rnd(0,W),rnd(0,H),rnd(0,W),rnd(0,H),rnd(0,W),rnd(0,H));
    ctx.strokeStyle = `rgba(${rndInt(80,160)},${rndInt(60,130)},${rndInt(40,100)},${rnd(0.12,0.22)})`;
    ctx.lineWidth = rnd(0.8, 2.2);
    ctx.stroke();
  }

  for (let i = 0; i < 80; i++) {
    ctx.fillStyle = `rgba(${rndInt(60,140)},${rndInt(50,120)},${rndInt(30,90)},${rnd(0.08,0.18)})`;
    ctx.beginPath();
    ctx.arc(rnd(0,W), rnd(0,H), rnd(0.5,2), 0, Math.PI*2);
    ctx.fill();
  }

  const chars = text.split("");
  const slotW = W / (chars.length + 0.5);
  let x = slotW * 0.3;

  for (let i = 0; i < chars.length; i++) {
    const f = fonts[rndInt(0, fonts.length)];
    const size = rndInt(22, 36);
    const weight = ['normal','bold','italic','bold italic'][rndInt(0,4)];
    ctx.font = `${weight} ${size}px ${f}`;

    const palettes = [
      `hsl(${rndInt(200,240)},60%,22%)`,
      `hsl(${rndInt(0,20)},65%,25%)`,
      `hsl(${rndInt(120,160)},55%,20%)`,
      `hsl(${rndInt(260,290)},55%,25%)`,
      `hsl(${rndInt(30,50)},70%,22%)`
    ];
    ctx.fillStyle = palettes[rndInt(0, palettes.length)];

    ctx.save();
    const cy = H/2 + rnd(-10, 10);
    ctx.translate(x, cy + rnd(-6, 6));
    ctx.rotate(rnd(-0.55, 0.55));
    ctx.scale(rnd(0.82, 1.18), rnd(0.82, 1.18));

    if (Math.random() > 0.6) {
      ctx.shadowColor = "rgba(0,0,0,0.25)";
      ctx.shadowBlur = 3;
      ctx.shadowOffsetX = rnd(1,3);
      ctx.shadowOffsetY = rnd(1,3);
    }

    ctx.fillText(chars[i], 0, 0);
    ctx.shadowColor = "transparent";
    ctx.restore();

    x += slotW * (chars[i] === " " ? 0.48 : 0.88) + rnd(-3, 3);
  }

  for (let i = 0; i < 5; i++) {
    ctx.beginPath();
    ctx.moveTo(rnd(0,W), rnd(0,H));
    ctx.lineTo(rnd(0,W), rnd(0,H));
    ctx.strokeStyle = `rgba(${rndInt(60,120)},${rndInt(40,100)},${rndInt(20,70)},${rnd(0.15,0.28)})`;
    ctx.lineWidth = rnd(1,2.5);
    ctx.stroke();
  }
}

function handleCheck() {
  if (checked) return;
  checked = true;
  const spinner = document.getElementById("spinnerWrap");
  const cb = document.getElementById("rcCheckbox");
  cb.style.border = "none";
  cb.style.cursor = "default";
  document.getElementById("checkboxHolder").style.cursor = "default";
  spinner.classList.add("spinning");
  setTimeout(() => {
    spinner.classList.remove("spinning");
    document.getElementById("checkmarkSvg").classList.add("visible");
    document.getElementById("challengeBox").classList.add("visible");
    currentPhrase = phrases[Math.floor(Math.random() * phrases.length)];
    drawCaptcha(currentPhrase);
    document.getElementById("captchaInput").focus();
  }, 900);
}

function verifyCaptcha() {
  const input = document.getElementById("captchaInput").value.trim();
  const fb = document.getElementById("feedbackMsg");
  if (input.toLowerCase() === currentPhrase.toLowerCase()) {
    fb.className = "feedback-msg success";
    fb.textContent = "✓ Send a screenshot showing this";
    document.getElementById("captchaInput").disabled = true;
    document.querySelector(".btn-verify").disabled = true;
  } else {
    fb.className = "feedback-msg error";
    fb.textContent = "Bro what, are u a bot? Lol, try again";
    document.getElementById("captchaInput").value = "";
    currentPhrase = phrases[Math.floor(Math.random() * phrases.length)];
    setTimeout(() => drawCaptcha(currentPhrase), 300);
  }
}

document.addEventListener("keydown", e => { if (e.key === "Enter") verifyCaptcha(); });
</script>
