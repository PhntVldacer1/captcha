<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phnt's Club Captcha</title>
  <style>
    :root {
      --font-sans: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --border-radius-md: 8px;
      --border-radius-lg: 14px;
      
      --color-accent: #6ecbff;
      --color-accent-dark: #49b7f5;
      --color-accent-soft: rgba(110,203,255,0.18);
      --color-accent-soft-strong: rgba(110,203,255,0.3);
      
      --color-background-primary: #ffffff;
      --color-background-secondary: #f9f8ff;
      --color-background-success: #ecfdf5;
      --color-background-danger: #fef2f2;
      
      --color-text-primary: #1f1a24;
      --color-text-secondary: #655e75;
      --color-text-tertiary: #9c93ac;
      --color-text-success: #047857;
      --color-text-danger: #b91c1c;
      
      --color-border-primary: #d1cbdc;
      --color-border-secondary: #e2dde9;
      --color-border-tertiary: #f0edf5;
      --color-border-success: #a7f3d0;
      --color-border-danger: #fecaca;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --color-background-primary: #13111c;
        --color-background-secondary: #1e1a2e;
        --color-background-success: #064e3b;
        --color-background-danger: #4c1d1d;
        
        --color-text-primary: #f3f1f6;
        --color-text-secondary: #a39bb4;
        --color-text-tertiary: #6b637a;
        --color-text-success: #34d399;
        --color-text-danger: #f87171;
        
        --color-border-primary: #3d3552;
        --color-border-secondary: #2d263f;
        --color-border-tertiary: #221c30;
        --color-border-success: #065f46;
        --color-border-danger: #7f1d1d;
      }
      body {
        background: #0b0914;
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(73,183,245,0.16), transparent 34%),
        linear-gradient(135deg, #071827 0%, #0b2133 48%, #0d2d46 100%);
    }

    #app {
      min-height: 580px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 1rem;
      background: transparent;
      font-family: var(--font-sans);
    }

    .page-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      width: 100%;
    }

    .brand-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .brand-logo {
      display: flex;
      align-items: center;
      gap: 11px;
    }

    .brand-icon {
      width: 42px;
      height: 42px;
      background: var(--color-accent);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand-name {
      font-size: 26px;
      font-weight: 500;
      color: var(--color-text-primary);
      letter-spacing: -0.5px;
    }

    .brand-name span { color: var(--color-accent-dark); }

    .brand-sub {
      font-size: 12px;
      color: var(--color-text-tertiary);
      display: flex;
      align-items: center;
      gap: 6px;
      letter-spacing: 0.2px;
    }

    .brand-sub .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--color-text-tertiary); opacity: 0.5; }

    .widget-card {
      background: var(--color-background-primary);
      border: 0.5px solid var(--color-border-secondary);
      border-radius: var(--border-radius-lg);
      width: 320px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.04);
    }

    .widget-top {
      display: flex;
      align-items: center;
      padding: 18px 18px;
      gap: 14px;
    }

    .checkbox-area {
      width: 32px;
      height: 32px;
      flex-shrink: 0;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }

    .rc-box {
      width: 24px; height: 24px;
      border: 2px solid var(--color-border-primary);
      border-radius: 6px;
      background: var(--color-background-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.15s, transform 0.1s;
      cursor: pointer;
    }
    .rc-box:hover { border-color: var(--color-accent-dark); transform: scale(1.06); }

    .spinner-ring { display: none; width: 24px; height: 24px; align-items: center; justify-content: center; }
    .spinner-ring.on { display: flex; }
    .spin-c { width: 22px; height: 22px; border: 2.5px solid var(--color-border-tertiary); border-top-color: var(--color-accent-dark); border-radius: 50%; animation: go 0.65s linear infinite; }
    @keyframes go { to { transform: rotate(360deg); } }

    .check-done { display: none; }
    .check-done.on { display: block; }

    .label-area { flex: 1; }
    .label-text { font-size: 14px; font-weight: 500; color: var(--color-text-primary); cursor: pointer; user-select: none; }
    .label-sub { font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; }

    .badge-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      border-left: 0.5px solid var(--color-border-tertiary);
      padding-left: 14px;
      min-width: 58px;
      flex-shrink: 0;
    }

    .badge-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--color-accent); opacity: 0.85; }
    .badge-txt { font-size: 8px; color: var(--color-text-tertiary); text-align: center; line-height: 1.4; font-weight: 500; }
    .badge-txt strong { display: block; font-size: 9px; color: var(--color-text-secondary); }

    .widget-footer {
      border-top: 0.5px solid var(--color-border-tertiary);
      padding: 7px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 9px;
      color: var(--color-text-tertiary);
    }

    .challenge-card {
      display: none;
      background: var(--color-background-primary);
      border: 0.5px solid var(--color-border-secondary);
      border-radius: var(--border-radius-lg);
      width: 320px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.04);
    }
    .challenge-card.show { display: block; }

    .ch-header {
      background: var(--color-accent);
      padding: 13px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .ch-header-icon {
      width: 30px; height: 30px;
      background: rgba(255,255,255,0.16);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .ch-header-txt h2 { font-size: 13px; font-weight: 500; color: #fff; margin: 0; }
    .ch-header-txt p { font-size: 11px; color: rgba(255,255,255,0.72); margin: 0; }

    .ch-body { padding: 14px 16px; }

    .captcha-wrap {
      border-radius: var(--border-radius-md);
      overflow: hidden;
      margin-bottom: 10px;
      border: 0.5px solid var(--color-border-tertiary);
      position: relative;
    }

    canvas { display: block; width: 100%; height: 88px; }

    .refresh-btn {
      position: absolute;
      top: 6px; right: 6px;
      width: 26px; height: 26px;
      background: rgba(110,203,255,0.18);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .refresh-btn:hover { background: rgba(110,203,255,0.3); }

    .attempts-wrap { display: flex; gap: 4px; margin-bottom: 10px; }
    .attempt-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--color-border-secondary);
      transition: background 0.2s;
    }
    .attempt-dot.used { background: var(--color-accent); }
    .attempt-dot.fail { background: #E24B4A; }

    .feedback {
      font-size: 12px;
      padding: 7px 10px;
      border-radius: var(--border-radius-md);
      margin-bottom: 10px;
      display: none;
      align-items: center;
      gap: 7px;
    }
    .feedback.ok { display: flex; background: var(--color-background-success); color: var(--color-text-success); border: 0.5px solid var(--color-border-success); }
    .feedback.bad { display: flex; background: var(--color-background-danger); color: var(--color-text-danger); border: 0.5px solid var(--color-border-danger); }

    .ch-input {
      width: 100%;
      padding: 9px 12px;
      font-size: 14px;
      border: 0.5px solid var(--color-border-secondary);
      border-radius: var(--border-radius-md);
      outline: none;
      font-family: var(--font-sans);
      color: var(--color-text-primary);
      background: var(--color-background-secondary);
      margin-bottom: 12px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .ch-input:focus { border-color: var(--color-accent-dark); box-shadow: 0 0 0 2px rgba(110,203,255,0.18); }

    .ch-actions { display: flex; justify-content: flex-end; }

    .btn-go {
      background: var(--color-accent);
      color: #fff;
      border: none;
      border-radius: var(--border-radius-md);
      padding: 8px 20px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: var(--font-sans);
      transition: background 0.15s, transform 0.1s;
      display: flex; align-items: center; gap: 6px;
    }
    .btn-go:hover { background: #33a8eb; }
    .btn-go:active { transform: scale(0.97); }
    .btn-go:disabled { background: var(--color-border-secondary); color: var(--color-text-tertiary); cursor: default; transform: none; }

    .ch-footer {
      border-top: 0.5px solid var(--color-border-tertiary);
      padding: 7px 14px;
      font-size: 9px;
      color: var(--color-text-tertiary);
      display: flex; align-items: center; gap: 5px;
    }

    .role-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(110,203,255,0.12);
      color: var(--color-accent-dark);
      font-size: 11px;
      font-weight: 500;
      padding: 3px 9px;
      border-radius: 99px;
      border: 0.5px solid rgba(110,203,255,0.3);
    }
    
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }
  </style>
</head>
<body>

<h2 class="sr-only">Phnt's Club verification widget</h2>

<div id="app">
  <div class="page-wrap">

    <div class="brand-header">
      <div class="brand-logo">
        <div class="brand-icon">
          <img src="https://i.ibb.co/WWGRcTzL/NORMAL-PFP.png" alt="Phnt profile picture" style="width:100%;height:100%;object-fit:cover;border-radius:12px;display:block;" />
        </div>
        <span class="brand-name">Phnt<span>'s Club</span></span>
      </div>
      <div class="brand-sub">
        Powered by <strong style="color:var(--color-text-secondary)">Phnt</strong>
        <span class="dot"></span>
        <strong style="color:var(--color-text-secondary)">S4IL</strong>
      </div>
    </div>

    <div class="widget-card">
      <div class="widget-top">
        <div class="checkbox-area" id="cbArea" onclick="handleCheck()">
          <div class="rc-box" id="rcBox">
            <div class="spinner-ring" id="spinnerRing"><div class="spin-c"></div></div>
            <svg class="check-done" id="checkDone" width="18" height="18" viewBox="0 0 18 18">
              <path d="M4 9l4 4 6-7" stroke="var(--color-accent-dark)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            </svg>
          </div>
        </div>
        <div class="label-area">
          <div class="label-text" onclick="handleCheck()">Receive Verified role</div>
          <div class="label-sub">Complete the challenge below</div>
        </div>
        <div class="badge-area">
          <div class="badge-dot"></div>
          <div class="badge-txt"><strong>Phnt Pass</strong>Secure</div>
        </div>
      </div>
      <div class="widget-footer">
        <span>Phnt's Club · Verified</span>
        <span>Powered by Phnt &amp; S4IL</span>
      </div>
    </div>

    <div class="challenge-card" id="challengeCard">
      <div class="ch-header">
        <div class="ch-header-icon">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
            <path d="M7.5 1.5L2 4.5v6l5.5 3 5.5-3v-6L7.5 1.5z" stroke="white" stroke-width="1.5" stroke-linejoin="round"/>
            <circle cx="7.5" cy="7.5" r="2" fill="white"/>
          </svg>
        </div>
        <div class="ch-header-txt">
          <h2>Type what you see</h2>
          <p>Case insensitive · Phnt's Club Pass</p>
        </div>
      </div>
      <div class="ch-body">
        <div class="captcha-wrap">
          <canvas id="cc" width="288" height="88"></canvas>
          <button class="refresh-btn" onclick="newPhrase()" title="New challenge">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="rgba(73,183,245,0.95)" stroke-width="1.7" stroke-linecap="round">
              <path d="M1.5 6.5a5 5 0 1 0 1-3M1.5 1v3.5H5"/>
            </svg>
          </button>
        </div>
        <div class="attempts-wrap">
          <div class="attempt-dot" id="d0"></div>
          <div class="attempt-dot" id="d1"></div>
          <div class="attempt-dot" id="d2"></div>
        </div>
        <div class="feedback" id="fb"></div>
        <input class="ch-input" id="ci" type="text" placeholder="Enter the text above" autocomplete="off"/>
        <div class="ch-actions">
          <button class="btn-go" id="verifyBtn" onclick="verifyCaptcha()">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M2 6.5h9M7 2.5l4 4-4 4"/></svg>
            Verify
          </button>
        </div>
      </div>
      <div class="ch-footer">
        <svg width="8" height="8" viewBox="0 0 8 8"><circle cx="4" cy="4" r="4" fill="var(--color-accent-dark)"/></svg>
        Phnt's Club · Powered by Phnt &amp; S4IL
      </div>
    </div>

  </div>
</div>

<script>
const phrases = [
  "Babft is cool","Build anything","Chillz Studios","Phnt Club",
  "Hairline went AFK","404 Hair Not Found","Phnt is cool","Best server ever",
  "S4IL so tuff","Who even builds a boat"
];
const fonts = [
  "Georgia,serif","Impact,fantasy","'Courier New',monospace",
  "Arial Black,sans-serif","Palatino,serif","'Times New Roman',serif",
  "Trebuchet MS,sans-serif","Verdana,sans-serif","Garamond,serif"
];

let phrase = "";
let checked = false;
let attempts = 0;

function rnd(a,b){return Math.random()*(b-a)+a;}
function ri(a,b){return Math.floor(rnd(a,b));}

function drawCaptcha(text){
  const cv=document.getElementById("cc");
  const ctx=cv.getContext("2d");
  const W=cv.width,H=cv.height;
  ctx.clearRect(0,0,W,H);
  const dark=window.matchMedia("(prefers-color-scheme: dark)").matches;
  ctx.fillStyle=dark?"#102b40":"#eef8ff";
  ctx.fillRect(0,0,W,H);
  for(let i=0;i<5;i++){
    ctx.beginPath();ctx.arc(rnd(0,W),rnd(0,H),rnd(25,60),0,Math.PI*2);
    ctx.fillStyle=`rgba(110,203,255,${rnd(0.08,0.16)})`;ctx.fill();
  }
  for(let i=0;i<9;i++){
    ctx.beginPath();ctx.moveTo(rnd(0,W),rnd(0,H));
    ctx.bezierCurveTo(rnd(0,W),rnd(0,H),rnd(0,W),rnd(0,H),rnd(0,W),rnd(0,H));
    ctx.strokeStyle=dark?`rgba(140,214,255,${rnd(0.12,0.24)})`:`rgba(73,183,245,${rnd(0.08,0.2)})`;
    ctx.lineWidth=rnd(0.7,2);ctx.stroke();
  }
  for(let i=0;i<70;i++){
    ctx.beginPath();ctx.arc(rnd(0,W),rnd(0,H),rnd(0.5,1.8),0,Math.PI*2);
    ctx.fillStyle=dark?`rgba(140,214,255,${rnd(0.12,0.22)})`:`rgba(73,183,245,${rnd(0.08,0.18)})`;
    ctx.fill();
  }
  const chars=text.split("");
  const slotW=W/(chars.length+0.4);
  let x=slotW*0.28;
  for(let i=0;i<chars.length;i++){
    const f=fonts[ri(0,fonts.length)];
    const size=ri(22,35);
    const w=['normal','bold','italic','bold italic'][ri(0,4)];
    ctx.font=`${w} ${size}px ${f}`;
    const clrs=dark
      ?[`hsl(${ri(195,210)},85%,82%)`,`hsl(${ri(205,225)},78%,78%)`,`hsl(${ri(185,200)},70%,80%)`]
      :[`hsl(${ri(198,210)},70%,38%)`,`hsl(${ri(208,220)},68%,32%)`,`hsl(${ri(188,200)},65%,34%)`];
    ctx.fillStyle=clrs[ri(0,clrs.length)];
    ctx.save();
    ctx.translate(x,H/2+rnd(-8,8));ctx.rotate(rnd(-0.5,0.5));ctx.scale(rnd(0.85,1.15),rnd(0.85,1.15));
    ctx.fillText(chars[i],0,0);ctx.restore();
    x+=slotW*(chars[i]===" "?0.45:0.86)+rnd(-2,2);
  }
  for(let i=0;i<4;i++){
    ctx.beginPath();ctx.moveTo(rnd(0,W),rnd(0,H));ctx.lineTo(rnd(0,W),rnd(0,H));
    ctx.strokeStyle=dark?`rgba(140,214,255,${rnd(0.18,0.3)})`:`rgba(73,183,245,${rnd(0.15,0.25)})`;
    ctx.lineWidth=rnd(1,2.2);ctx.stroke();
  }
}

function newPhrase(){
  phrase=phrases[ri(0,phrases.length)];
  drawCaptcha(phrase);
  document.getElementById("ci").value="";
  const fb=document.getElementById("fb");
  fb.className="feedback";fb.textContent="";
}

function handleCheck(){
  if(checked)return;
  checked=true;
  const box=document.getElementById("rcBox");
  box.style.cursor="default";
  document.getElementById("cbArea").style.cursor="default";
  box.style.border="none";
  document.getElementById("spinnerRing").classList.add("on");
  setTimeout(()=>{
    document.getElementById("spinnerRing").classList.remove("on");
    document.getElementById("checkDone").classList.add("on");
    document.getElementById("challengeCard").classList.add("show");
    newPhrase();
    setTimeout(()=>document.getElementById("ci").focus(),100);
  },900);
}

function verifyCaptcha(){
  const input=document.getElementById("ci").value.trim();
  const fb=document.getElementById("fb");
  const ci=document.getElementById("ci");
  const verifyBtn=document.getElementById("verifyBtn");

  if(verifyBtn.disabled)return;

  if(input.toLowerCase()===phrase.toLowerCase()){
    fb.className="feedback ok";
    fb.innerHTML='<svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M2 6.5l3.5 3.5 5.5-6"/></svg> Verified! Send a screenshot to get your role.';
    ci.disabled=true;
    verifyBtn.disabled=true;
  } else {
    if(attempts<3){
      document.getElementById("d"+attempts).classList.add("fail");
      attempts++;
    }

    ci.value="";

    if(attempts>=3){
      fb.className="feedback bad";
      fb.innerHTML='<svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 3l7 7M10 3l-7 7"/></svg> Bro what, are u a bot? Lol';
      ci.disabled=true;
      verifyBtn.disabled=true;
      verifyBtn.textContent="Blocked";
    } else {
      fb.className="feedback";
      fb.textContent="";
      setTimeout(()=>newPhrase(),400);
    }
  }
}

document.addEventListener("keydown",e=>{if(e.key==="Enter")verifyCaptcha();});
</script>
</body>
</html>
